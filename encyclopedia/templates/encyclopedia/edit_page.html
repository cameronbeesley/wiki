{% extends "encyclopedia/layout.html" %}

{% block title %}
    Edit Page
{% endblock %}

{% block body %}
    <h1>Editing {{ entry }}</h1>

    <form action="{% url 'edit' entry %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="error-messages">
        {% for error_message in error_messages %}
            {{ error_message }}
        {% endfor %}
        </div>

        <input type="submit" value="Save">

{% endblock %}
