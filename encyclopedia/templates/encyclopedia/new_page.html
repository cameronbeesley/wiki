{% extends "encyclopedia/layout.html" %}

{% block title %}
    New Page
{% endblock %}

{% block body %}
    <form action="{% url 'new_page' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="error-messages">
        {% for error_message in error_messages %}
            {{ error_message }}
        {% endfor %}
        </div>

        <input type="submit" value="Save">

{% endblock %}
